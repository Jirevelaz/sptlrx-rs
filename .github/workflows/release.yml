name: Release Pipeline

# Solo se dispara al crear un tag de versión (ej: v1.0.0)
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Build multi-arquitectura con Nix ────────────────────────────────────────
  # Nota: CI (fmt, clippy, test, audit) ya corre en cada push a master.
  # Para cuando se crea un tag, el commit ya pasó todas las verificaciones.
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            nix-system: x86_64-linux
            artifact-suffix: x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build static binary
        run: nix build .#static --system ${{ matrix.nix-system }}

      - name: Prepare artifact
        run: |
          cp result/bin/sptlrx-rs ./sptlrx-rs-${{ matrix.artifact-suffix }}
          chmod +w ./sptlrx-rs-${{ matrix.artifact-suffix }}
          strip ./sptlrx-rs-${{ matrix.artifact-suffix }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact-suffix }}
          path: ./sptlrx-rs-${{ matrix.artifact-suffix }}

  # ── Publicar Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Binarios disponibles

            | Archivo | Arquitectura | Descripción |
            |---------|-------------|-------------|
            | `sptlrx-rs-x86_64` | x86_64 | Intel/AMD (mayoría de PCs) |


            ### Instalación rápida
            ```bash
            chmod +x sptlrx-rs-*
            sudo mv sptlrx-rs-x86_64 /usr/local/bin/sptlrx-rs
            ```
